<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairplay Demo</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        body { background: #fff; }
        .demo-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .demo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .demo-header h1 { font-size: 20px; font-weight: 700; }
        .demo-header .demo-tag {
            background: #fffbeb;
            color: #92400e;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
        }
        .score-textarea {
            width: 100%;
            min-height: 280px;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }
        .score-textarea:focus { border-color: #0a0a0a; }
        .result-score { font-size: 56px; font-weight: 800; line-height: 1; }
        .breakdown-bar { height: 8px; border-radius: 4px; background: #f0f0f0; margin-top: 6px; }
        .breakdown-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .breakdown-item { margin-bottom: 14px; }
        .breakdown-label { display: flex; justify-content: space-between; font-size: 14px; }
        .result-section { margin-bottom: 24px; }
        .result-section-title {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .deal-banner {
            padding: 14px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <div class="nav-logo">F</div>
            <h1>Fairplay</h1>
            <span class="demo-tag">Live Demo</span>
        </div>

        <div class="card" id="input-card">
            <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 4px;">Score a Sales Conversation</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Paste any call transcript below. Fairplay will score it against a qualification framework and show you what it would do.</p>

            <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Framework</label>
                    <select id="framework">
                        <option value="bant">BANT</option>
                        <option value="meddic">MEDDIC</option>
                        <option value="spiced">SPICED</option>
                        <option value="spin">SPIN</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>Meeting Title (optional)</label>
                    <input type="text" id="meeting-title" placeholder="e.g. Discovery Call with Acme Corp">
                </div>
            </div>

            <div class="form-group">
                <label>Call Transcript</label>
                <textarea class="score-textarea" id="transcript" placeholder="Paste the full call transcript here...

Example format:
John (Sales): Thanks for jumping on today. Tell me a bit about what's driving this conversation.
Sarah (Prospect): We've been struggling with pipeline accuracy. Our forecast is off by 30% every quarter..."></textarea>
            </div>

            <div class="form-group">
                <label>Your Work Email</label>
                <input type="email" id="demo-email" placeholder="you@company.com" required>
                <div class="hint">Required to score. We'll follow up with your results.</div>
            </div>

            <button class="btn btn-primary" id="score-btn" onclick="scoreIt()" style="width: 100%; justify-content: center; padding: 14px;">
                Score This Conversation
            </button>
        </div>

        <div class="card" id="result-card" style="display: none;">
            <div id="deal-banner" style="display: none;"></div>

            <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 28px;">
                <div>
                    <span class="result-score" id="r-score"></span>
                    <span style="font-size: 24px; color: #ccc;">/100</span>
                </div>
                <div>
                    <div id="r-badge" style="margin-bottom: 8px;"></div>
                    <div id="r-framework" style="font-size: 13px; color: #888;"></div>
                    <div id="r-dealname" style="font-size: 13px; color: #888; margin-top: 2px;"></div>
                </div>
            </div>

            <div class="result-section">
                <div class="result-section-title">Key Insight</div>
                <div id="r-insight" style="font-style: italic; color: #444; font-size: 15px;"></div>
            </div>

            <div class="result-section">
                <div class="result-section-title">Framework Breakdown</div>
                <div id="r-breakdown"></div>
            </div>

            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; display: flex; gap: 12px;">
                <button class="btn btn-secondary" onclick="resetDemo()">Score Another</button>
                <a href="https://niclfairplay.lovable.app" class="btn btn-primary" target="_blank">Get Fairplay for Your Team</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function scoreColor(s) {
            if (s >= 70) return '#22c55e';
            if (s >= 50) return '#f59e0b';
            return '#ef4444';
        }

        function recBadge(rec) {
            const map = {
                'auto_create': { label: 'Deal Created', bg: '#ecfdf5', color: '#059669' },
                'needs_review': { label: 'Needs Review', bg: '#fffbeb', color: '#d97706' },
                'not_a_deal': { label: 'Not a Deal', bg: '#fef2f2', color: '#dc2626' },
            };
            const m = map[rec] || { label: rec, bg: '#f3f4f6', color: '#6b7280' };
            return `<span style="display:inline-block;padding:4px 12px;border-radius:100px;font-size:13px;font-weight:600;background:${m.bg};color:${m.color};">${m.label}</span>`;
        }

        async function scoreIt() {
            const transcript = document.getElementById('transcript').value.trim();
            const email = document.getElementById('demo-email').value.trim();
            if (!email || !email.includes('@') || email.includes('gmail') || email.includes('yahoo') || email.includes('hotmail')) {
                alert('Please enter a valid work email address.'); return;
            }
            if (!transcript) { alert('Paste a transcript first'); return; }
            if (transcript.length < 200) { alert('Transcript is too short. Paste a full conversation.'); return; }

            const btn = document.getElementById('score-btn');
            btn.textContent = 'Scoring... (this takes 15-30 seconds)';
            btn.disabled = true;

            // Send lead info to Slack (Kevin's request access webhook)
            try {
                fetch(atob('aHR0cHM6Ly9ob29rcy5zbGFjay5jb20vc2VydmljZXMvVDBBNldKVlVRQUYvQjBBTlNNN0swUkYva0hjZm9aU0E2YVM3enljQmpTSzVUM3VW'), {
                    method: 'POST',
                    body: JSON.stringify({text: `:test_tube: *Fairplay Demo Used*\nEmail: ${email}\nFramework: ${document.getElementById('framework').value}\nTitle: ${document.getElementById('meeting-title').value || 'N/A'}\nTranscript length: ${transcript.length} chars`}),
                });
            } catch(e) {}

            try {
                const res = await fetch(API_BASE + '/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        transcript: transcript,
                        framework: document.getElementById('framework').value,
                        meeting_title: document.getElementById('meeting-title').value.trim() || 'Demo Transcript',
                        demo_mode: true,
                    }),
                });

                if (res.status === 429) {
                    throw new Error('You\'ve reached the demo limit (5 scores per day). Sign up for unlimited access at niclfairplay.lovable.app');
                }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Scoring failed');
                }

                const result = await res.json();

                // Score
                const scoreEl = document.getElementById('r-score');
                scoreEl.textContent = result.score;
                scoreEl.style.color = scoreColor(result.score);

                // Badge
                document.getElementById('r-badge').innerHTML = recBadge(result.recommendation);

                // Framework
                document.getElementById('r-framework').textContent = (result.framework || 'custom').toUpperCase() + ' Framework';

                // Deal name
                document.getElementById('r-dealname').textContent = result.deal_name || '';

                // Insight
                document.getElementById('r-insight').textContent = result.key_insight || 'N/A';

                // Breakdown
                const breakdown = result.score_result?.breakdown || {};
                let html = '';
                for (const [key, val] of Object.entries(breakdown)) {
                    const pct = (val.score / val.max) * 100;
                    const color = pct >= 70 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444';
                    html += `
                        <div class="breakdown-item">
                            <div class="breakdown-label">
                                <span style="font-weight:500;">${val.label || key}</span>
                                <span style="font-weight:700;">${val.score}/${val.max}</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill" style="width:${pct}%;background:${color};"></div>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('r-breakdown').innerHTML = html;

                // Banner
                const banner = document.getElementById('deal-banner');
                if (result.score >= 70) {
                    banner.style.display = 'block';
                    banner.style.background = '#ecfdf5';
                    banner.style.color = '#059669';
                    banner.textContent = 'This conversation qualifies as a deal. Fairplay would auto-create it in your CRM.';
                } else if (result.score >= 50) {
                    banner.style.display = 'block';
                    banner.style.background = '#fffbeb';
                    banner.style.color = '#92400e';
                    banner.textContent = 'This conversation is borderline. Fairplay would route it to your Needs Review queue.';
                } else {
                    banner.style.display = 'block';
                    banner.style.background = '#fef2f2';
                    banner.style.color = '#991b1b';
                    banner.textContent = 'This conversation does not qualify as a deal based on the framework criteria.';
                }

                // Show result, scroll to it
                document.getElementById('result-card').style.display = 'block';
                document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.textContent = 'Score This Conversation';
                btn.disabled = false;
            }
        }

        function resetDemo() {
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('transcript').value = '';
            document.getElementById('meeting-title').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
